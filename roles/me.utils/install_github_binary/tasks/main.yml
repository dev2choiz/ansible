---
- name: Assert required variables
  assert:
    that:
      - github_repo | length > 0
      - binary_src_name | length > 0
      - binary_dest_name | length > 0
      - github_asset_name | length > 0

- name: "[{{ github_repo }}] Resolve github release and download"
  include_role:
    name: me.utils/fetch_github_asset

- name: "[{{ github_repo }}] Install binary to: {{ install_dir }}/{{ binary_dest_name }}"
  copy:
    src: >-
      {%- if extract_archive -%}
        {{ tmp_dir }}/{{ binary_src_name }}
      {%- else -%}
        {{ tmp_dir }}/{{ github_asset_name }}
      {%- endif -%}
    dest: "{{ install_dir }}/{{ binary_dest_name }}"
    mode: "0755"
    remote_src: true
  become: true

- name: "[{{ github_repo }}] Cleanup: {{ tmp_dir }}"
  file:
    path: "{{ tmp_dir }}"
    state: absent
  when: delete_tmp_dir
