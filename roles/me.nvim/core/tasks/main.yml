---
- name: install nvim dependencies
  become: true
  apt:
    update_cache: true
    state: present
    name:
      - git
      - build-essential
      - rsync
      - unzip
      - ripgrep
      - fd-find
      - sqlite3
      - xclip
      - fontconfig

- name: Test if nvim is installed
  include_role:
    name: me.utils/check_install
  vars:
    check_binary: nvim
    target_roles: [nvim_core, nvim]

- name: Delete previous nvim
  when: need_install
  become: true
  file:
    path: /opt/nvim
    state: absent

- name: Install Neovim
  when: need_install
  include_role:
    name: me.utils/install_github_archive_app
  vars:
    github_repo: "neovim/neovim"
    github_asset_name: "nvim-linux-x86_64.tar.gz"
    binary_path_within_archive: "bin/nvim"
    install_dir: "/opt/nvim"
    symlink_path: "/usr/local/bin"
    tmp_dir: "/tmp/nvim"
    archive_root_dir: "nvim-linux-x86_64"
    app_name: "nvim"
    github_release_tag: "nightly"
