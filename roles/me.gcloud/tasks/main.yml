---
- name: Test if gcloud need installation
  include_role:
    name: me.utils/check_install
  vars:
    check_binary: gcloud
    target_roles: [gcloud]

- name: Create a tmp path
  when: need_install
  file:
    path: "/tmp/install_gcloud"
    state: directory
    mode: "0755"

- name: Install gcloud
  when: need_install
  include_role:
    name: ansible.install-gcloud
  vars:
    gcloud_tmp_path: /tmp/install_gcloud
    gcloud_archive_name: google-cloud-cli-linux-x86_64.tar.gz

- name: Remove the tmp path
  file:
    path: "/tmp/install_gcloud"
    state: absent
