---
- name: Test if tree-sitter need installation
  include_role:
    name: me.utils/check_install
  vars:
    check_binary: tree-sitter
    target_roles: [treesitter]

- name: Resolve the latest tree-sitter tag github_asset_name
  include_role:
    name: me.utils/github_release_resolver
  vars:
    github_repo: "tree-sitter/tree-sitter"
    github_asset_name: "dummy"
    github_release_tag: "latest"
  when: need_install

- name: Download tree-sitter
  get_url:
    url: "https://github.com/tree-sitter/tree-sitter/releases/download/{{ github_latest_tag }}/tree-sitter-linux-x64.gz"
    dest: /tmp/tree-sitter.gz
    mode: "0644"
  when: need_install

- name: Gunzip tree-sitter
  command: gunzip -f /tmp/tree-sitter.gz
  when: need_install

- name: Install tree-sitter binary
  become: true
  copy:
    src: /tmp/tree-sitter
    dest: /usr/local/bin/tree-sitter
    mode: "0755"
    remote_src: true
  when: need_install
