---
- name: Install zsh
  become: true
  apt:
    name:
      - zsh
    state: present

- name: Install Oh My Zsh
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: ~/.oh-my-zsh
    depth: 1
    version: master

- name: Create symlink for .zshrc
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/zsh/.zshrc"
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    state: link
    force: true

- name: Create symlink for zshrc.d directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/zsh/zshrc.d"
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc.d"
    state: link
    force: true

- name: Install zsh-autosuggestions plugin
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    version: master

- name: Install zsh-completions plugin
  git:
    repo: https://github.com/zsh-users/zsh-completions
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-completions"
    depth: 1
    version: master

- name: Install zsh-syntax-highlighting plugin
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    version: master

- name: Install ollama plugin
  git:
    repo: https://github.com/ocodo/ollama_zsh_completion.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/ollama"
    depth: 1
    version: main

- name: Install fzf-tab plugin
  git:
    repo: https://github.com/Aloxaf/fzf-tab.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/fzf-tab"
    depth: 1
    version: master

- name: Install powerlevel10k theme
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
    version: master

- name: Copy ~/.p10k.zsh
  copy:
    src: files/zsh/.p10k.zsh
    dest: "{{ ansible_facts['env']['HOME'] }}/.p10k.zsh"
    mode: "0644"
