- name: "Install TUIs"
  hosts: localhost

  pre_tasks:
    - name: Check if vars/main.yml exists
      ansible.builtin.stat:
        path: vars/main.yml
      register: vars_main_file
      tags: always
    - name: Load vars/main.yml if exists
      ansible.builtin.include_vars:
        file: vars/main.yml
      when: vars_main_file.stat.exists
      tags: always

  roles:
    - role: me.tui/lazygit
      tags: [tui, nvim, lazygit]
    - role: me.tui/lazydocker
      tags: [tui, nvim, lazydocker]
    - role: me.tui/lazysql
      tags: [tui, nvim, lazysql]
    - role: me.tui/eza
      tags: [tui, nvim, eza]
    - role: me.tui/lazymake
      tags: [tui, nvim, lazymake]
    - role: me.tui/posting
      tags: [tui, nvim, posting]
    - role: me.tui/resterm
      tags: [tui, nvim, resterm]
    - role: me.tui/yazi
      tags: [tui, nvim, yazi]
    - role: me.tui/tools
      tags: [tui, nvim, tuitools]
