- name: "Install neovim"
  import_playbook: playbook-nvim.yml

- name: "Install OS tools"
  hosts: localhost

  pre_tasks:
    - name: Check if vars/main.yml exists
      ansible.builtin.stat:
        path: vars/main.yml
      register: vars_main_file
      tags: always
    - name: Load vars/main.yml if exists
      ansible.builtin.include_vars:
        file: vars/main.yml
      when: vars_main_file.stat.exists
      tags: always

    - name: Install base packages
      become: true
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - git
          - vim
          - curl
          - snapd
          - wget
          - openssh-server
          - lsof
          - libfuse2
          # for gcloud
          - python3
          # for terraform
          - gnupg
          - software-properties-common
          - apt-transport-https
          - fonts-jetbrains-mono
          # other
          - python3-pip
          - python3-full
          - pipx
      when: ansible_run_tags | difference(['all']) | length == 0

    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: always
    - name: Enable and start SSH service
      become: true
      ansible.builtin.systemd:
        name: ssh
        enabled: true
        state: started
      when:
        - ansible_run_tags | difference(['all']) | length == 0
        - "'ssh.service' in ansible_facts.services"

    - name: "Create {{ ansible_facts['env']['HOME'] }}/sources"
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/sources"
        state: directory
        mode: "0755"
      when: ansible_run_tags | difference(['all']) | length == 0

  roles:
    - role: me.ollama
      tags: ollama
    - role: me.golang
      tags: golang
    - role: me.git
      tags: git
    - role: me.docker
      tags: docker
    - role: me.kitty
      tags: kitty
    - role: me.terminator
      tags: terminator
    - role: me.nvim/core
      tags: [nvim_core, nvim]
    - role: me.tmux
      tags: tmux
    - role: me.zsh
      tags: zsh
    - role: me.chrome
      tags: chrome
    # - role: me.jetbrains_toolbox
    #   tags: jetbrains_toolbox
    - role: me.terraform
      tags: terraform
    - role: me.rust
      tags: rust
    - role: me.helm
      tags: helm
    - role: me.devtoys
      tags: devtoys
    - role: me.postman
      tags: postman
    - role: me.insomnia
      tags: insomnia
    - role: me.dbeaver
      tags: dbeaver
    - role: me.nodejs
      tags: nodejs
    - role: me.gcloud
      tags: gcloud
    - role: me.vscode
      tags: vscode
    - role: me.libreoffice
      tags: libreoffice
