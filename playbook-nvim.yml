- hosts: localhost
  vars_files:
    - vars/vars.yml

  pre_tasks:
    - name: Gather service facts
      service_facts:
      tags: always
    - name: Set facts
      tags: always
      set_fact:
        github_arch: "{{ arch_map[ansible_architecture] }}"

  roles:
    - role: me.nvim/core
      tags: [nvim_core, nvim]
    - role: me.nvim/lazyvim
      tags: [lazyvim]
    - role: me.font
      tags: [nvim, font]
    - role: me.fzf
      tags: [nvim, fzf]
    - role: me.dbclient
      tags: [nvim, dbclient]
    - role: me.treesitter
      tags: [nvim, treesitter]
    - role: me.tools/tectonic
      tags: [nvim, tectonic]
    - role: me.tools/mmdc
      tags: [nvim, mmdc]
    - role: me.tools/delta
      tags: [nvim, delta]

- import_playbook: playbook-tui.yml
  vars:
    github_arch: "{{ arch_map[ansible_architecture] }}"
