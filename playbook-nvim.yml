- name: "Install neovim"
  hosts: localhost

  pre_tasks:
    - name: Check if vars/main.yml exists
      ansible.builtin.stat:
        path: vars/main.yml
      register: vars_main_file
      tags: always
    - name: Load vars/main.yml if exists
      ansible.builtin.include_vars:
        file: vars/main.yml
      when: vars_main_file.stat.exists
      tags: always

    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: always

  roles:
    - role: me.nvim/core
      tags: [nvim_core, nvim]
    - role: me.nvim/lazyvim
      tags: [lazyvim]
    - role: me.font
      tags: [nvim, font]
    - role: me.fzf
      tags: [nvim, fzf]
    - role: me.dbclient
      tags: [nvim, dbclient]
    - role: me.treesitter
      tags: [nvim, treesitter]
    - role: me.tools/tectonic
      tags: [nvim, tectonic]
    - role: me.tools/mmdc
      tags: [nvim, mmdc]
    - role: me.tools/delta
      tags: [nvim, delta]

- name: "Install TUIs"
  import_playbook: playbook-tui.yml
